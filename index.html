<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Local-First Notes</title>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>
		<style>
:root {
	--bg: #f9f9f9; --sidebar-bg: #ececec; --text: #333; 
	--border: #ccc; --accent: #0066cc; --danger: #cc0000;
}
		body {
			margin: 0; display: flex; height: 100vh; font-family: system-ui, -apple-system, sans-serif;
			background: var(--bg); color: var(--text); overflow: hidden;
		}
		#sidebar {
			width: 300px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
			display: flex; flex-direction: column;
		}
		.sidebar-header {
			padding: 10px; border-bottom: 1px solid var(--border);
			display: flex; flex-wrap: wrap; gap: 5px;
		}
		button {
			padding: 6px 12px; cursor: pointer; border: 1px solid var(--border);
			background: white; border-radius: 4px; font-size: 13px;
		}
		button:hover { background: #f0f0f0; }
		#search-bar {
			width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box;
			border: 1px solid var(--border); border-radius: 4px;
		}
		#file-list {
			flex-grow: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0;
		}
		.file-item {
			padding: 10px; border-bottom: 1px solid var(--border); cursor: pointer;
			display: flex; justify-content: space-between; align-items: center; font-size: 14px;
		}
		.file-item:hover { background: #e0e0e0; }
		.file-item.active { background: #d0e0f0; border-left: 3px solid var(--accent); }
		.file-item .match-count { font-size: 11px; color: #666; }
		#main {
			flex-grow: 1; display: flex; flex-direction: column; background: white;
		}
		#status-bar {
			padding: 10px; background: #fff3cd; color: #856404; border-bottom: 1px solid #ffeeba;
			font-size: 14px; display: none; align-items: center; justify-content: space-between;
		}
		#status-bar.error { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
		#editor-header {
			padding: 10px 20px; border-bottom: 1px solid var(--border); font-weight: bold;
			display: flex; justify-content: space-between;
		}
		#note-content {
			flex-grow: 1; width: 100%; box-sizing: border-box; padding: 20px;
			border: none; resize: none; font-family: monospace; font-size: 15px;
			line-height: 1.5; outline: none; background: transparent; transition: opacity 0.2s;
		}
		#note-content:disabled { cursor: not-allowed; }
		</style>
	</head>
	<body>

		<div id="sidebar">
			<div class="sidebar-header">
				<button onclick="createFile()">+ New</button>
				<button id="pull-btn" onclick="pullFromGitHub()">⬇️ Pull</button>
				<button id="push-btn" onclick="pushToGitHub()">⬆️ Push</button>
				<button onclick="configureGitHub()">⚙️ Setup</button>
				<button onclick="clearLocalDB()" style="color: var(--danger);">🗑️ Clear DB</button>
				<input type="text" id="search-bar" placeholder="Filter files... (Enter for deep search)" oninput="handleSearchInput()" onkeydown="handleSearchEnter(event)">
			</div>
			<ul id="file-list"></ul>
		</div>

		<div id="main">
			<div id="status-bar"></div>
			<div id="editor-header">
				<span id="current-filename">No file selected</span>
				<button id="delete-btn" onclick="deleteFile()" style="display:none; color: var(--danger);">Delete</button>
			</div>
			<textarea id="note-content" oninput="handleTyping()" disabled placeholder="Select or create a file to start typing..."></textarea>
		</div>

		<script>
			/* =====================================================================
			1. CONFIGURATION & STATE
		===================================================================== */
			let GITHUB_TOKEN = localStorage.getItem('gh_token') || '';
			let GITHUB_OWNER = localStorage.getItem('gh_owner') || '';
			let GITHUB_REPO = localStorage.getItem('gh_repo') || '';

			let currentFilename = null;
			const dbName = 'NotesDB';
			const storeName = 'notes';

			const utoa = (text) => {
				const bytes = new TextEncoder().encode(text);
				let binString = '';
				for (let i = 0; i < bytes.byteLength; i++) {
					binString += String.fromCharCode(bytes[i]);
				}
				return btoa(binString);
			};

			const atou = (b64) => {
				const cleanB64 = b64.replace(/[\r\n]+/g, '');
				const binString = atob(cleanB64);
				const bytes = new Uint8Array(binString.length);
				for (let i = 0; i < binString.length; i++) {
					bytes[i] = binString.charCodeAt(i);
				}
				return new TextDecoder().decode(bytes);
			};

			function configureGitHub() {
				GITHUB_TOKEN = prompt('GitHub Personal Access Token:', GITHUB_TOKEN) || GITHUB_TOKEN;
				GITHUB_OWNER = prompt('GitHub Username:', GITHUB_OWNER) || GITHUB_OWNER;
				GITHUB_REPO = prompt('GitHub Repository Name:', GITHUB_REPO) || GITHUB_REPO;
				localStorage.setItem('gh_token', GITHUB_TOKEN);
				localStorage.setItem('gh_owner', GITHUB_OWNER);
				localStorage.setItem('gh_repo', GITHUB_REPO);
				showStatus('Configuration saved. Ready to pull.', false);
			}

			/* =====================================================================
		   2. INDEXED DB WRAPPER
		===================================================================== */
			function initDB() {
				return new Promise((resolve, reject) => {
					const request = indexedDB.open(dbName, 1);
					request.onupgradeneeded = (e) => {
						const db = e.target.result;
						if (!db.objectStoreNames.contains(storeName)) {
							db.createObjectStore(storeName, { keyPath: 'filename' });
						}
					};
					request.onsuccess = () => resolve(request.result);
					request.onerror = () => reject(request.error);
				});
			}

			async function dbPut(note) {
				const db = await initDB();
				return new Promise((resolve) => {
					const tx = db.transaction(storeName, 'readwrite');
					tx.objectStore(storeName).put(note);
					tx.oncomplete = () => resolve();
				});
			}

			async function dbGet(filename) {
				const db = await initDB();
				return new Promise((resolve) => {
					const tx = db.transaction(storeName, 'readonly');
					const request = tx.objectStore(storeName).get(filename);
					request.onsuccess = () => resolve(request.result);
				});
			}

			async function dbGetAll() {
				const db = await initDB();
				return new Promise((resolve) => {
					const tx = db.transaction(storeName, 'readonly');
					const request = tx.objectStore(storeName).getAll();
					request.onsuccess = () => resolve(request.result);
				});
			}

			async function dbDelete(filename) {
				const db = await initDB();
				return new Promise((resolve) => {
					const tx = db.transaction(storeName, 'readwrite');
					tx.objectStore(storeName).delete(filename);
					tx.oncomplete = () => resolve();
				});
			}

			async function clearLocalDB() {
				if (!confirm('WARNING: This will permanently delete ALL local notes, including un-pushed changes. Are you sure you want to clear the database?')) return;

				const db = await initDB();
				return new Promise((resolve, reject) => {
					const tx = db.transaction(storeName, 'readwrite');
					tx.objectStore(storeName).clear();
					tx.oncomplete = () => {
						currentFilename = null;
						document.getElementById('note-content').value = '';
						document.getElementById('note-content').disabled = true;
						document.getElementById('current-filename').innerText = 'No file selected';
						document.getElementById('delete-btn').style.display = 'none';

						loadFileList();
						syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
						showStatus('Local database completely cleared.');
						resolve();
					};
					tx.onerror = () => {
						showStatus('Failed to clear local database.', true);
						reject(tx.error);
					};
				});
			}

			/* =====================================================================
		   3. MULTI-TAB SYNCHRONIZATION
		===================================================================== */
			const syncChannel = new BroadcastChannel('github_notes_sync');

			syncChannel.onmessage = (event) => {
				if (event.data.type === 'SIDEBAR_REFRESH') {
					loadFileList();
				}

				if (event.data.type === 'LOCAL_EDIT') {
					if (currentFilename === event.data.filename) {
						const textArea = document.getElementById('note-content');
						if (!textArea.disabled) {
							textArea.disabled = true;
							textArea.style.opacity = '0.7';

							document.getElementById('pull-btn').disabled = true;
							document.getElementById('push-btn').disabled = true;

							showStatus(`⚠️ Edited in another tab. <button onclick="openFile('${currentFilename}')">Reload</button>`, true);
						}
					}
				}
			};

			/* =====================================================================
		   4. UI & EDITOR LOGIC
		===================================================================== */
			function showStatus(htmlMsg, isError = false) {
				const bar = document.getElementById('status-bar');
				bar.innerHTML = htmlMsg;
				bar.style.display = 'flex';
				bar.className = isError ? 'error' : '';
				if (!isError) setTimeout(() => bar.style.display = 'none', 4000);
			}

			async function loadFileList(searchTerm = '', deepSearch = false) {
				let notes = await dbGetAll();
				const listEl = document.getElementById('file-list');
				listEl.innerHTML = '';

				const term = searchTerm.toLowerCase();

				if (term) {
					if (deepSearch) {
						notes.forEach(note => {
							const content = (note.content || '').toLowerCase();
							const matches = content.split(term).length - 1;
							note.matchCount = matches;
						});
						notes = notes.filter(n => n.matchCount > 0 || n.filename.toLowerCase().includes(term));
						notes.sort((a, b) => (b.matchCount || 0) - (a.matchCount || 0));
					} else {
						notes = notes.filter(n => n.filename.toLowerCase().includes(term));
					}
				} else {
					notes.sort((a, b) => a.filename.localeCompare(b.filename));
				}

				notes.forEach(note => {
					const li = document.createElement('li');
					li.className = 'file-item' + (note.filename === currentFilename ? ' active' : '');
					li.onclick = () => openFile(note.filename);

					let icon = '🟢'; 
					if (note.sync_status === 'conflict') icon = '🔴';
					else if (note.is_dirty) icon = '🟡'; 

					let html = `<span>${icon} ${note.filename}</span>`;
					if (deepSearch && note.matchCount) {
						html += `<span class="match-count">${note.matchCount} match${note.matchCount > 1 ? 'es' : ''}</span>`;
					}
					li.innerHTML = html;
					listEl.appendChild(li);
				});
			}

			async function openFile(filename) {
				const note = await dbGet(filename);
				if (!note) return;

				document.getElementById('pull-btn').disabled = false;
				document.getElementById('push-btn').disabled = false;

				currentFilename = filename;
				const textArea = document.getElementById('note-content');

				textArea.disabled = false;
				textArea.style.opacity = '1';
				textArea.value = note.content;

				document.getElementById('current-filename').innerText = filename;
				document.getElementById('delete-btn').style.display = 'block';
				document.getElementById('status-bar').style.display = 'none';

				loadFileList(document.getElementById('search-bar').value, false);
			}

			async function handleTyping() {
				if (!currentFilename) return;
				const textArea = document.getElementById('note-content');

				const note = await dbGet(currentFilename);
				if (note) {
					note.content = textArea.value;
					note.is_dirty = true;
					note.sync_status = 'unsaved';
					await dbPut(note);

					syncChannel.postMessage({ type: 'LOCAL_EDIT', filename: currentFilename });
					loadFileList(document.getElementById('search-bar').value, false);
				}
			}

			async function createFile() {
				let filename = prompt('Enter filename (e.g., draft.txt):');
				if (!filename) return;
				if (!filename.includes('.')) filename += '.txt'; 

				const existing = await dbGet(filename);
				if (existing) return alert('File already exists locally.');

				await dbPut({
					filename: filename,
					content: '',
					last_synced_sha: null,
					is_dirty: true,
					sync_status: 'unsaved'
				});

				syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
				openFile(filename);
			}

			async function deleteFile() {
				if (!currentFilename || !confirm(`Delete ${currentFilename}? This cannot be undone.`)) return;

				await dbDelete(currentFilename);

				currentFilename = null;
				document.getElementById('note-content').value = '';
				document.getElementById('note-content').disabled = true;
				document.getElementById('current-filename').innerText = 'No file selected';
				document.getElementById('delete-btn').style.display = 'none';

				syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
				loadFileList();
			}

			/* =====================================================================
		   5. SEARCH ENGINE
		===================================================================== */
			function handleSearchInput() {
				const term = document.getElementById('search-bar').value;
				loadFileList(term, false);
			}

			function handleSearchEnter(event) {
				if (event.key === 'Enter') {
					const term = document.getElementById('search-bar').value;
					loadFileList(term, true);
				}
			}

			/* =====================================================================
		   6. GITHUB API & MERGE LOGIC
		===================================================================== */
			function getAuthHeaders() {
				if (!GITHUB_TOKEN) throw new Error('GitHub token not configured.');
				return {
					'Authorization': `token ${GITHUB_TOKEN}`,
					'Accept': 'application/vnd.github.v3+json',
					'Content-Type': 'application/json'
				};
			}

async function pullFromGitHub() {
    try {
        showStatus('Pulling from GitHub...');
        const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/`;
        const fetchOptions = { headers: getAuthHeaders(), cache: 'no-store' };

        const res = await fetch(url, fetchOptions);
        if (!res.ok) throw new Error('Failed to fetch repo tree.');

        const files = await res.json();
        let skippedFiles = [];

        for (const file of files) {
            if (file.type !== 'file') continue;

            const localNote = await dbGet(file.name);

            // 1. THE SMART PULL: If SHAs match, skip downloading the content entirely
            if (localNote && localNote.last_synced_sha === file.sha) {
                continue;
            }

            // Only fetch heavy content if SHAs differ
            const fileRes = await fetch(file.url, fetchOptions);
            const fileData = await fileRes.json();
            const remoteContent = atou(fileData.content);

            // 2. CONFLICT DETECTION
            if (localNote && localNote.is_dirty && localNote.content !== remoteContent) {
                
                // 3. THE FOCUS CHECK: Only prompt if it's the active file
                if (currentFilename === file.name) {
                    const msg = `Conflict in ${file.name}!\n\n1: Insert Diff markers (Default)\n2: Overwrite local with remote\n3: Cancel pull for this file`;
                    const choice = prompt(msg, "1");

                    if (choice === "3") {
                        skippedFiles.push(file.name);
                        continue;
                    } else if (choice === "2") {
                        await dbPut({
                            filename: file.name,
                            content: remoteContent,
                            last_synced_sha: file.sha,
                            is_dirty: false,
                            sync_status: 'synced'
                        });
                        document.getElementById('note-content').value = remoteContent;
                    } else {
                        showStatus(`Conflict in ${file.name}. Injecting merge markers...`, true);
                        if (typeof Diff !== 'undefined') {
                            let mergedText = "";
                            const diffBlocks = Diff.diffLines(remoteContent, localNote.content);
                            diffBlocks.forEach(part => {
                                if (part.added) mergedText += `<<<<<<< LOCAL\n${part.value}=======\n`;
                                else if (part.removed) mergedText += `${part.value}>>>>>>> REMOTE\n`;
                                else mergedText += part.value;
                            });
                            localNote.content = mergedText;
                        } else {
                            localNote.content = `<<<<<<< LOCAL\n${localNote.content}\n=======\n${remoteContent}\n>>>>>>> REMOTE`;
                        }

                        localNote.last_synced_sha = file.sha; 
                        localNote.sync_status = 'conflict';
                        await dbPut(localNote);
                        document.getElementById('note-content').value = localNote.content;
                    }
                } else {
                    // FILE IS IN BACKGROUND: Do not prompt. Protect local data. Flag as conflict.
                    skippedFiles.push(file.name);
                    localNote.sync_status = 'conflict';
                    await dbPut(localNote);
                    continue; // Skip to next file safely
                }

            } else {
                // NORMAL CLEAN PULL
                await dbPut({
                    filename: file.name,
                    content: remoteContent,
                    last_synced_sha: file.sha,
                    is_dirty: false,
                    sync_status: 'synced'
                });

                if (currentFilename === file.name) {
                    document.getElementById('note-content').value = remoteContent;
                }
            }
        }

        // 4. FEEDBACK
        if (skippedFiles.length > 0) {
            showStatus(`Pull complete. ⚠️ Skipped background conflicts: ${skippedFiles.join(', ')}. Open them to resolve.`, true);
        } else {
            showStatus('Pull complete. All files up to date.');
        }

        syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
        loadFileList();

    } catch (err) {
        showStatus(`Pull failed: ${err.message}`, true);
    }
}

			async function pushToGitHub() {
				try {
					showStatus('Pushing to GitHub...');
					const notes = await dbGetAll();
					const dirtyNotes = notes.filter(n => n.is_dirty);

					if (dirtyNotes.length === 0) {
						showStatus('Everything is up to date.');
						return;
					}

					for (const note of dirtyNotes) {
						const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${note.filename}`;

						const payload = {
							message: `Auto-sync: ${note.filename}`,
							content: utoa(note.content),
						};
						if (note.last_synced_sha) payload.sha = note.last_synced_sha;

						const res = await fetch(url, {
							method: 'PUT',
							headers: getAuthHeaders(),
							body: JSON.stringify(payload)
						});

						if (res.status === 409) {
							throw new Error(`Conflict in ${note.filename}: Remote has newer changes. Please Pull first.`);
						} else if (!res.ok) {
							throw new Error(`Failed to push ${note.filename}`);
						} else {
							const responseData = await res.json();
							note.last_synced_sha = responseData.content.sha;
							note.is_dirty = false;
							note.sync_status = 'synced';
							await dbPut(note);
						}
					}
					showStatus('Push complete.');
					syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
					loadFileList();
				} catch (err) {
					showStatus(`Push error: ${err.message}`, true);
				}
			}

			window.onload = () => loadFileList();
		</script>
	</body>
</html>
